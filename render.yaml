# Render.com Blueprint
# See https://render.com/docs/blueprint-spec

services:
  - type: web
    name: ai-conversation-demo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120 web.demo:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # Primary env var names
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
      # Alternative env var names (user-friendly)
      - key: CHATGPTAPIKEY
        sync: false
      - key: GROKAPIKEY
        sync: false
      - key: CLAUDEAPIKEY
        sync: false
      - key: GEMINIAPIKEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true
    plan: free
